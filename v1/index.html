<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Käsitööliste tööriista funktsionaalsused</title>
<style>
  body { font-family: sans-serif; background: #F5F2ED; margin: 0; padding: 20px; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Käsitööliste ja kunstnike tööriista funktsionaalsuste kaart</title>
  <desc>Kuus peamoodulit koos alamfunktsioonidega</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .th { font-family: sans-serif; font-size: 14px; font-weight: 500; }
    .ts { font-family: sans-serif; font-size: 12px; font-weight: 400; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }
    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .th { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }
    .c-pink rect { fill: #FBEAF0; stroke: #993556; }
    .c-pink .th { fill: #72243E; }
    .c-pink .ts { fill: #993556; }
  </style>

  <!-- ROW 1 -->
  <!-- 1. Ülesannete haldus -->
  <g class="c-purple">
    <rect x="30" y="30" width="290" height="170" rx="12" stroke-width="0.5"/>
    <text class="th" x="175" y="60" text-anchor="middle" dominant-baseline="central">Ülesannete haldus</text>
    <text class="ts" x="50" y="88" dominant-baseline="central">Kanban vaade (nädala/kuu)</text>
    <text class="ts" x="50" y="110" dominant-baseline="central">Värvikoodiga taskid</text>
    <text class="ts" x="50" y="132" dominant-baseline="central">Lohistamine (drag &amp; drop)</text>
    <text class="ts" x="50" y="154" dominant-baseline="central">Tähtajad ja prioriteedid</text>
    <text class="ts" x="50" y="176" dominant-baseline="central">Korduvad ülesanded</text>
  </g>

  <!-- 2. Kalender -->
  <g class="c-teal">
    <rect x="360" y="30" width="290" height="170" rx="12" stroke-width="0.5"/>
    <text class="th" x="505" y="60" text-anchor="middle" dominant-baseline="central">Kalender</text>
    <text class="ts" x="378" y="88" dominant-baseline="central">Nädala- ja kuuvaade</text>
    <text class="ts" x="378" y="110" dominant-baseline="central">Värvilised sündmused</text>
    <text class="ts" x="378" y="132" dominant-baseline="central">Tähtajad ja tellimuskalender</text>
    <text class="ts" x="378" y="154" dominant-baseline="central">Messide ja turgude planeerimine</text>
    <text class="ts" x="378" y="176" dominant-baseline="central">Meeldetuletused</text>
  </g>

  <!-- ROW 2 -->
  <!-- 3. Märkmik ja ideed -->
  <g class="c-amber">
    <rect x="30" y="230" width="290" height="170" rx="12" stroke-width="0.5"/>
    <text class="th" x="175" y="260" text-anchor="middle" dominant-baseline="central">Märkmik &amp; ideed</text>
    <text class="ts" x="50" y="288" dominant-baseline="central">Vaba tekst + pildid</text>
    <text class="ts" x="50" y="310" dominant-baseline="central">Inspiratsiooni kogumine</text>
    <text class="ts" x="50" y="332" dominant-baseline="central">Materjalide ja retseptide märkmed</text>
    <text class="ts" x="50" y="354" dominant-baseline="central">Toodete ideekaardid</text>
    <text class="ts" x="50" y="376" dominant-baseline="central">Siltide ja märksõnadega otsing</text>
  </g>

  <!-- 4. Toote haldus -->
  <g class="c-coral">
    <rect x="360" y="230" width="290" height="170" rx="12" stroke-width="0.5"/>
    <text class="th" x="505" y="260" text-anchor="middle" dominant-baseline="central">Toote haldus &amp; lansseerimine</text>
    <text class="ts" x="378" y="288" dominant-baseline="central">Tootekataloogi haldus</text>
    <text class="ts" x="378" y="310" dominant-baseline="central">Varude jälgimine</text>
    <text class="ts" x="378" y="332" dominant-baseline="central">Lansseerimise planeerimine</text>
    <text class="ts" x="378" y="354" dominant-baseline="central">Fotoarhiiv per toode</text>
    <text class="ts" x="378" y="376" dominant-baseline="central">Tellimuste olek</text>
  </g>

  <!-- ROW 3 -->
  <!-- 5. Sotsiaalmeedia -->
  <g class="c-blue">
    <rect x="30" y="430" width="290" height="170" rx="12" stroke-width="0.5"/>
    <text class="th" x="175" y="460" text-anchor="middle" dominant-baseline="central">Sotsiaalmeedia haldus</text>
    <text class="ts" x="50" y="488" dominant-baseline="central">Sisu kalender (IG, FB, TikTok)</text>
    <text class="ts" x="50" y="510" dominant-baseline="central">Postituste ajastamine</text>
    <text class="ts" x="50" y="532" dominant-baseline="central">Sisupanga haldus</text>
    <text class="ts" x="50" y="554" dominant-baseline="central">Kampaaniate planeerimine</text>
    <text class="ts" x="50" y="576" dominant-baseline="central">Hashtag-ide ja teksti mallid</text>
  </g>

  <!-- 6. Finantsid -->
  <g class="c-green">
    <rect x="360" y="430" width="290" height="170" rx="12" stroke-width="0.5"/>
    <text class="th" x="505" y="460" text-anchor="middle" dominant-baseline="central">Finantsid &amp; hinnakujundus</text>
    <text class="ts" x="378" y="488" dominant-baseline="central">Materjalikulude arvestus</text>
    <text class="ts" x="378" y="510" dominant-baseline="central">Töötunni hinna kalkulaator</text>
    <text class="ts" x="378" y="532" dominant-baseline="central">Marginaali ja müügihinna arvutus</text>
    <text class="ts" x="378" y="554" dominant-baseline="central">Arve genereerimine</text>
    <text class="ts" x="378" y="576" dominant-baseline="central">Tulu ja kulu ülevaade</text>
  </g>

  <!-- ROW 4 full width -->
  <!-- 7. Taimer -->
  <g class="c-pink">
    <rect x="30" y="630" width="620" height="150" rx="12" stroke-width="0.5"/>
    <text class="th" x="340" y="660" text-anchor="middle" dominant-baseline="central">Taimer &amp; tootlikkus</text>
    <text class="ts" x="60" y="692" dominant-baseline="central">Ülesande-põhine taimer (Pomodoro võimalusega)</text>
    <text class="ts" x="60" y="714" dominant-baseline="central">Ajakulu per projekt / toode</text>
    <text class="ts" x="60" y="736" dominant-baseline="central">Automaatne aja logimine</text>
    <text class="ts" x="60" y="758" dominant-baseline="central">Tunnipalga arvutus tegeliku aja põhjal</text>
  </g>
</svg>
</body>
</html>
